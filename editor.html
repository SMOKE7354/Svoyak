<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор — Своя Игра</title>
    <link rel="stylesheet" href="css/editor.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="editor-body">
    <header class="editor-header">
        <div class="editor-brand">
            <span class="editor-logo">✎</span>
            <div>
                <h1>Редактор игры</h1>
                <p id="editor-status" class="editor-status">Загрузка…</p>
            </div>
        </div>
        <div class="editor-actions">
            <button type="button" id="btn-save" class="ed-btn ed-btn-primary">💾 Сохранить в игру</button>
            <button type="button" id="btn-export" class="ed-btn ed-btn-ghost">Экспорт JSON</button>
            <label class="ed-btn ed-btn-ghost ed-btn-file">
                Импорт JSON
                <input type="file" id="import-file" accept=".json,application/json" hidden>
            </label>
            <button type="button" id="btn-reset" class="ed-btn ed-btn-danger">Сбросить к стандартной</button>
        </div>
        <nav class="editor-nav">
            <a href="host.html" class="ed-link">Панель ведущего</a>
            <a href="index.html" class="ed-link">Табло</a>
        </nav>
    </header>

    <div id="toast" class="toast hidden"></div>

    <main class="editor-main">
        <aside class="editor-sidebar">
            <div class="sidebar-section">
                <h2>Раунды</h2>
                <div id="round-tabs" class="round-tabs"></div>
            </div>

            <div class="sidebar-section">
                <div class="section-head">
                    <h2>Категории</h2>
                    <button type="button" id="btn-add-category" class="ed-btn ed-btn-sm ed-btn-gold">+</button>
                </div>
                <ul id="category-list" class="category-list"></ul>
            </div>

            <div class="sidebar-section sidebar-hint">
                <p>Всё сохраняется <strong>локально</strong> в браузере — Firebase не нужен. После сохранения обновите панель ведущего.</p>
            </div>
        </aside>

        <section class="editor-workspace">
            <div id="empty-state" class="empty-state">
                <p>Выберите категорию слева или создайте новую</p>
            </div>

            <div id="category-editor" class="category-editor hidden">
                <div class="cat-header">
                    <label class="field-label">Название категории</label>
                    <input type="text" id="cat-name-input" class="ed-input ed-input-lg" maxlength="40" placeholder="Например: Кино">
                    <button type="button" id="btn-delete-category" class="ed-btn ed-btn-danger ed-btn-sm">Удалить категорию</button>
                </div>

                <div class="round-meta">
                    <label class="field-label">Название раунда</label>
                    <input type="text" id="round-title-input" class="ed-input">
                    <label class="field-label">Подзаголовок (на табло)</label>
                    <input type="text" id="round-subtitle-input" class="ed-input">
                </div>

                <div id="questions-list" class="questions-list"></div>
            </div>
        </section>
    </main>

    <script src="js/data.js?v=7"></script>
    <script src="js/editor.js?v=7"></script>
</body>
</html>
