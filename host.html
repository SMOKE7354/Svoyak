<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель ведущего — Свояк</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/host.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="host-body">
    <header class="host-header">
        <div class="host-header-left">
            <h2>Своя Игра</h2>
            <span id="host-round-indicator" class="host-round-indicator">Лобби</span>
            <span id="host-progress" class="host-progress hidden">0/0</span>
        </div>
        <div class="host-header-right">
            <span id="host-status" class="host-status disconnected">Табло offline</span>
            <button id="host-to-board-btn" class="btn secondary host-to-board-btn hidden" type="button">← Табло</button>
        </div>
    </header>

    <div id="firebase-setup-banner" class="firebase-setup-banner hidden"></div>

    <!-- Lobby -->
    <div id="host-lobby-screen" class="host-fullscreen active">
        <div class="host-lobby-panel glass-panel">
            <h1 class="glow-text">Панель ведущего</h1>
            <p class="subtitle">Добавьте игроков → запустите раунд. На TV: <code>index.html</code>, код <strong>SVOYAK</strong></p>

            <div class="lobby-setup-row">
                <input type="text" id="player-input" placeholder="Имя игрока" autocomplete="off">
                <button id="add-player-btn" class="btn primary">+</button>
            </div>
            <ul id="players-list" class="host-players-list"></ul>

            <div class="round-launch-panel">
                <div class="round-buttons">
                    <button id="start-round-1" class="btn round-btn" data-round="1" disabled>
                        <span class="round-btn-num">1</span><span>100–500</span>
                    </button>
                    <button id="start-round-2" class="btn round-btn" data-round="2" disabled>
                        <span class="round-btn-num">2</span><span>200–1000</span>
                    </button>
                    <button id="start-round-3" class="btn round-btn" data-round="3" disabled>
                        <span class="round-btn-num">3</span><span>500–2500</span>
                    </button>
                </div>
                <p id="round-hint" class="round-hint">Добавьте игроков</p>
            </div>
        </div>
    </div>

    <!-- Game -->
    <div id="host-game-screen" class="host-fullscreen hidden">
        <div class="host-layout">
            <aside class="host-sidebar">
                <div id="sidebar-players-list" class="sidebar-players"></div>
                <div class="host-toolbar-mini">
                    <button class="btn-sm success" onclick="triggerEffect('correct')" title="Верно">✓</button>
                    <button class="btn-sm danger" onclick="triggerEffect('wrong')" title="Мимо">✗</button>
                    <button class="btn-sm primary" onclick="triggerEffect('applause')" title="Браво">👏</button>
                </div>
                <div class="sidebar-footer">
                    <button id="end-round-btn" class="btn secondary full-width">Завершить раунд</button>
                    <button id="reset-game-btn" class="btn danger-outline full-width">Новая игра</button>
                </div>
            </aside>

            <main class="host-main">
                <div id="host-board-screen" class="host-screen active">
                    <div id="host-grid" class="grid host-grid"></div>
                </div>

                <div id="host-question-screen" class="host-screen hidden">
                    <div class="q-top-bar">
                        <div>
                            <span id="host-q-category" class="q-cat">Категория</span>
                            <span id="host-q-price" class="q-price-tag">100</span>
                        </div>
                        <div id="host-timer-badge" class="host-timer-badge hidden">⏱ <span id="host-timer-val">30</span></div>
                    </div>

                    <div class="q-body">
                        <div class="q-card compact">
                            <p id="host-q-text">…</p>
                        </div>
                        <div class="a-card compact">
                            <p id="host-q-answer">…</p>
                        </div>
                    </div>

                    <div id="quick-score-panel" class="quick-score-panel"></div>

                    <div class="host-action-bar">
                        <select id="timer-val" class="timer-select">
                            <option value="15">15с</option>
                            <option value="30" selected>30с</option>
                            <option value="45">45с</option>
                            <option value="60">60с</option>
                        </select>
                        <button class="btn primary" id="start-timer-btn">▶</button>
                        <button class="btn success" id="show-answer-btn">Ответ</button>
                        <button class="btn neutral" id="nobody-answered-btn">Никто</button>
                        <button class="btn secondary" id="close-question-btn">Табло</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js?v=5"></script>
    <script src="js/data.js?v=5"></script>
    <script src="js/sync.js?v=5"></script>
    <script src="js/host.js?v=5"></script>
</body>
</html>
